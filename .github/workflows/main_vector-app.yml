name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Restore, build, and verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore app
        run: dotnet restore vector-app-local.csproj

      - name: Restore tenant isolation verifier
        run: dotnet restore tests/TenantIsolationTests/TenantIsolationTests.csproj

      - name: Build app
        run: dotnet build vector-app-local.csproj --configuration Release --no-restore

      - name: Build tenant isolation verifier
        run: dotnet build tests/TenantIsolationTests/TenantIsolationTests.csproj --configuration Release --no-restore

      - name: Run tenant isolation verifier
        run: dotnet run --project tests/TenantIsolationTests/TenantIsolationTests.csproj --configuration Release --no-build
